<main class="settings">
  <h1 class="settings__heading">Settings</h1>
  @if (quota(); as q) {
    <section class="settings__quota" aria-labelledby="quota-heading">
      <h2 id="quota-heading" class="settings__quota-title">Your daily limit</h2>
      <div class="settings__quota-grid">
        <article class="settings__quota-card">
          <h3>My IP quota</h3>
          <p class="settings__quota-num">{{ q.ipQuotaRemaining }} / 3</p>
          <p class="settings__quota-desc">remaining generations today</p>
        </article>
        <article class="settings__quota-card">
          <h3>System-wide quota</h3>
          <p class="settings__quota-num">{{ q.systemQuotaRemaining }} / 12</p>
          <p class="settings__quota-desc">remaining generations today (all users)</p>
        </article>
      </div>
    </section>
  } @else {
    <p>Loading quota information...</p>
  }
</main>
