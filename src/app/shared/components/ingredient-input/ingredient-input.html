<section class="ingredient-input">
  <div class="ingredient-input__form">
    <div class="ingredient-input__field-group">
      <label for="ingredient-name" class="ingredient-input__label">Ingredient</label>
      <div class="ingredient-input__autocomplete">
        <input
          id="ingredient-name"
          type="text"
          class="ingredient-input__text"
          [(ngModel)]="name"
          placeholder="e.g. Pasta"
          (input)="onNameInput()"
          (blur)="hideSuggestions()"
          (keyup.enter)="addIngredient()"
          autocomplete="off">
        @if (suggestions().length > 0) {
          <ul class="ingredient-input__suggestions" role="listbox" aria-label="Ingredient suggestions">
            @for (s of suggestions(); track s) {
              <li class="ingredient-input__suggestion"
                  role="option"
                  (mousedown)="selectSuggestion(s)">{{ s }}</li>
            }
          </ul>
        }
      </div>
    </div>
    <div class="ingredient-input__size-group">
      <label for="ingredient-amount" class="ingredient-input__label">Quantity</label>
      <div class="ingredient-input__size-row">
        <input
          id="ingredient-amount"
          type="number"
          class="ingredient-input__amount"
          [(ngModel)]="amount"
          min="1">
        <select class="ingredient-input__unit" [(ngModel)]="unit" aria-label="Unit">
          @for (u of units; track u) {
            <option [value]="u">{{ u }}</option>
          }
        </select>
        <button
          class="ingredient-input__add"
          type="button"
          (click)="addIngredient()"
          aria-label="Add ingredient">+</button>
      </div>
    </div>
  </div>
</section>
